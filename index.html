<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YP Automotive</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000000;
    --silver-light: #b8b8b8;
    --silver-mid: #6e6e6e;
    --silver-dark: #3a3a3a;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--silver-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Very subtle grain for depth */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 56px;
    z-index: 1;
    padding: 0 24px;
  }

  .logo-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-wrapper img {
    width: min(340px, 62vw);
    height: auto;
    display: block;
    /* Makes the JPG's black background blend seamlessly with the page */
    mix-blend-mode: screen;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--silver-dark), transparent);
  }

  .tagline {
    font-weight: 200;
    font-size: clamp(0.95rem, 1.5vw, 1.15rem);
    letter-spacing: 0.55em;
    text-indent: 0.55em;
    text-transform: uppercase;
    color: var(--silver-light);
  }

  .footer {
    position: absolute;
    bottom: 32px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 48px;
    font-size: 0.72rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--silver-mid);
    z-index: 1;
  }

  .footer a {
    color: var(--silver-mid);
    text-decoration: none;
    transition: color 0.4s ease;
  }
  .footer a:hover { color: var(--silver-light); }

  @media (max-width: 600px) {
    .footer {
      flex-direction: column;
      gap: 10px;
      text-align: center;
      bottom: 24px;
    }
    .container { gap: 44px; }
  }
</style>
</head>
<body>

  <div class="container">
    <div class="logo-wrapper">
      <img src="YP_logo.jpg" alt="YP Automotive">
    </div>
    <div class="divider"></div>
    <div class="tagline">Coming Soon</div>
  </div>

  <div class="footer">
    <span>&copy; 2026 YP Automotive</span>
    <a href="mailto:contact@ypautomotive.com">contact@ypautomotive.com</a>
  </div>

</body>
</html>
