<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YP Automotive</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #000000;
    --silver-light: #b8b8b8;
    --silver-mid: #6e6e6e;
    --silver-dark: #3a3a3a;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--silver-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    z-index: 1;
    width: 100%;
    padding: 0 32px;
  }

  .logo-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .logo-wrapper img {
    width: min(780px, 88vw);
    height: auto;
    display: block;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--silver-dark), transparent);
  }

  .tagline {
    font-weight: 200;
    font-size: clamp(0.9rem, 1.4vw, 1.1rem);
    letter-spacing: 0.55em;
    text-indent: 0.55em;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    color: transparent;
  }

  .tagline::before {
    content: 'Coming Soon';
    position: absolute;
    inset: 0;
    color: var(--silver-dark);
    letter-spacing: inherit;
    text-indent: inherit;
  }

  .tagline::after {
    content: 'Coming Soon';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      90deg,
      transparent 0%,
      var(--silver-dark) 20%,
      var(--silver-light) 50%,
      var(--silver-dark) 80%,
      transparent 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    background-size: 200% 100%;
    background-position: 200% center;
    animation: glide 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    letter-spacing: inherit;
    text-indent: inherit;
  }

  @keyframes glide {
    0%   { background-position: 200% center; }
    50%  { background-position: -200% center; }
    100% { background-position: -200% center; }
  }

  .footer {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 28px 24px;
    font-size: 0.72rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--silver-mid);
    border-top: 1px solid rgba(200,200,200,0.06);
    z-index: 1;
  }

  .footer a {
    color: var(--silver-mid);
    text-decoration: none;
    transition: color 0.3s ease;
  }
  .footer a:hover { color: var(--silver-light); }

  .footer-dot {
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--silver-dark);
  }

  .socials {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .socials a {
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
  }

  .socials a:hover { transform: scale(1.15); }

  .socials a svg {
    width: 16px;
    height: 16px;
    fill: var(--silver-mid);
    transition: fill 0.3s ease;
  }

  .socials a:hover svg { fill: var(--silver-light); }

  @media (max-width: 600px) {
    .footer {
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      padding: 20px 24px;
    }
    .footer-dot { display: none; }
    .container { gap: 32px; }
  }
</style>
</head>
<body>

  <div class="container">
    <div class="logo-wrapper">
      <img src="YP_logo.png" alt="YP Automotive">
    </div>
    <div class="divider"></div>
    <div class="tagline">Coming Soon</div>
  </div>

  <div class="footer">
    <span>&copy; 2026 YP Automotive</span>
    <div class="footer-dot"></div>
    <a href="mailto:contact@yp-automotive.com">contact@yp-automotive.com</a>
    <div class="footer-dot"></div>
    <div class="socials">
      <a href="https://wa.me/38346187316" target="_blank" rel="noopener" aria-label="WhatsApp">

      </a>
    </div>
  </div>

</body>
</html>
